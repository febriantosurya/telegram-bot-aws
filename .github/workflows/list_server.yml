name: Server Listing
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to run the workflow on'
        required: true
        default: 'master'
jobs:
  Provision_EC2:
    environment: Telegram-Bot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.1.7"
      - name: Initialize Terraform
        working-directory: ./list_ec2_resources
        run: terraform init
      - name: Apply Terraform to List Instances
        working-directory: ./list_ec2_resources
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "ap-southeast-1"
        run: |
          terraform apply -auto-approve
          INSTANCE_IDS=$(terraform output -json instance_ids | jq -r '.[]')
          echo "Instance IDs: $INSTANCE_IDS"
          echo "instance_ids=$INSTANCE_IDS" >> $GITHUB_ENV
      - name: Show Instance IDs
        run: |
          if [ -z "${{ env.instance_ids }}" ]; then
            echo "No EC2 instances found."
          else
            echo "The following EC2 instances were found: ${{ env.instance_ids }}"
          fi