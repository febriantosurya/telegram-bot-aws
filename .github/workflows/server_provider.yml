name: Server Auto Provisioner
on: 
  workflow_dispatch:
    inputs:
      class:
        description: 'EC2 Instance Class'
        required: true
      type:
        description: 'EC2 Instance Type'
        required: true
jobs:
  Provision_EC2:
    environment: Telegram-Bot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.1.7"
      - name: Initialize Terraform
        working-directory: ./list_ec2_resources
        run: terraform init
      - name: Apply Terraform to List Instances
        working-directory: ./list_ec2_resources
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          terraform apply -auto-approve
          INSTANCE_IDS=$(terraform output -json instance_ids | jq -r '.[]')
          echo "Instance IDs: $INSTANCE_IDS"
          echo "instance_ids=$INSTANCE_IDS" >> $GITHUB_ENV
      - name: Show Instance IDs
        run: echo "The following EC2 instances were found: ${{ env.instance_ids }}"
      
      
      
      
      
